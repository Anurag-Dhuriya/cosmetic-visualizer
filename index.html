<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORION</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'deep-blue':    '#1E3A8A',
            'royal-blue':   '#2563EB',
            'soft-blue':    '#60A5FA',
            'cyan-accent':  '#22D3EE',
            'app-bg':       '#0B1220',
            'sidebar-bg':   '#0F1A2E',
            'canvas-bg':    '#020617',
            'card-bg':      '#111827',
            'border-def':   '#1F2937',
            'text-primary': '#F9FAFB',
            'text-second':  '#D1D5DB',
            'text-muted':   '#94A3B8',
          },
          fontFamily: {
            sans: ['IBM Plex Sans', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    /* Reset & lock viewport */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0B1220;
    }

    /* Custom slider */
    .slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px;
      background: #1F2937; outline: none; cursor: pointer;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #60A5FA; cursor: pointer;
      border: 2px solid #0B1220;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    .slider::-webkit-slider-thumb:hover { background: #2563EB; transform: scale(1.05); }
    .slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #60A5FA; cursor: pointer; border: 2px solid #0B1220;
    }
    .slider-filled {
      background: linear-gradient(
        to right,
        #2563EB 0%, #2563EB var(--fill-pct, 60%),
        #1F2937 var(--fill-pct, 60%), #1F2937 100%
      );
    }
    .slider-bilateral {
      background: linear-gradient(
        to right,
        #1F2937 0%, #1F2937 var(--left-pct, 50%),
        #2563EB var(--left-pct, 50%), #2563EB var(--right-pct, 50%),
        #1F2937 var(--right-pct, 50%), #1F2937 100%
      );
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #374151; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.75s linear infinite; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    @keyframes pulseOpacity { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
    .pulse { animation: pulseOpacity 1.4s ease-in-out infinite; }

    input[type="file"] { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

const API_BASE = 'http://localhost:8000';
const LOGO_SRC = 'orion.png';

const TREATMENTS = {
  Face:     ['temples_fillers','cheek_fillers','chin_fillers','jawline_contouring','forehead_lines','glabellar_lines','nasolabial_folds','marionette_folds'],
  Lips:     ['plumper','cupids_bow','upper_lip_fillers','lower_lip_fillers','corner_lip_lift_fillers'],
  Nose:     ['contouring','bridge_fillers','root_fillers','tip_lift_fillers','slimming_fillers'],
  Eyebrows: ['brow_lift'],
};

const CATEGORY_ICONS = {
  Face:     <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-3.866 3.134-7 7-7s7 3.134 7 7"/></svg>,
  Lips:     <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75"><path d="M12 18s-7-3-7-7c0-2 1.5-3.5 3.5-3.5 1.2 0 2.2.6 3 1.5.8-.9 1.8-1.5 3-1.5C16.5 7.5 18 9 18 11c0 4-6 7-6 7z"/></svg>,
  Nose:     <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75"><path d="M12 3v11M8.5 14c0 2 1.6 4 3.5 4s3.5-2 3.5-4"/><path d="M8.5 14H6.5M15.5 14h2"/></svg>,
  Eyebrows: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75"><path d="M3 9c1.5-2.5 4-3.5 6-3.5s3.5 1 3.5 1"/><path d="M21 9c-1.5-2.5-4-3.5-6-3.5s-3.5 1-3.5 1"/></svg>,
};

function formatTreatment(t) {
  return t.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

/* ── Button ─────────────────────────────────────────────────── */
function Button({ children, variant = 'secondary', onClick, disabled, fullWidth, className = '' }) {
  const base = 'flex items-center justify-center gap-1.5 px-3 py-2 rounded-md text-xs font-medium transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap';
  const variants = {
    primary:   'bg-deep-blue text-blue-100 hover:bg-royal-blue',
    final:     'text-white',
    secondary: 'bg-border-def text-text-second hover:bg-gray-700',
    ghost:     'bg-transparent border border-border-def text-text-muted hover:bg-card-bg hover:text-text-second',
  };
  const style = variant === 'final'
    ? { background: 'linear-gradient(135deg,#22D3EE,#2563EB)', boxShadow: '0 2px 8px rgba(34,211,238,0.12)' }
    : {};
  return (
    <button onClick={onClick} disabled={disabled} style={style}
      className={`${base} ${variants[variant]} ${fullWidth ? 'w-full' : ''} ${className}`}>
      {children}
    </button>
  );
}

/* ── Slider ─────────────────────────────────────────────────── */
function Slider({ label, value, min, max, onChange, unit = '%', bilateral = false }) {
  const range = max - min;
  const pct = ((value - min) / range) * 100;
  let sliderStyle = {};
  if (bilateral) {
    const mid = 50;
    sliderStyle = pct >= mid
      ? { '--left-pct': `${mid}%`, '--right-pct': `${pct}%` }
      : { '--left-pct': `${pct}%`, '--right-pct': `${mid}%` };
  } else {
    sliderStyle = { '--fill-pct': `${pct}%` };
  }
  return (
    <div className="space-y-1.5">
      <div className="flex items-center justify-between">
        <span className="text-xs text-text-muted font-medium tracking-wide uppercase">{label}</span>
        <span className="font-mono text-xs text-soft-blue tabular-nums">
          {value > 0 && bilateral ? '+' : ''}{value}{unit}
        </span>
      </div>
      <input type="range" min={min} max={max} value={value}
        onChange={e => onChange(Number(e.target.value))}
        style={sliderStyle}
        className={`slider ${bilateral ? 'slider-bilateral' : 'slider-filled'}`} />
    </div>
  );
}

/* ── SectionCard ─────────────────────────────────────────────── */
function SectionCard({ title, children, className = '' }) {
  return (
    <div className={`bg-card-bg border border-border-def rounded-lg overflow-hidden ${className}`}>
      {title && (
        <div className="px-3 py-2 border-b border-border-def">
          <span className="text-xs font-semibold tracking-widest uppercase text-text-muted">{title}</span>
        </div>
      )}
      <div className="p-3">{children}</div>
    </div>
  );
}

/* ── StatusDot ────────────────────────────────────────────────── */
function StatusDot({ status }) {
  const colors = { idle:'bg-gray-600', ready:'bg-emerald-500', loading:'bg-royal-blue pulse', error:'bg-red-500' };
  return <span className={`inline-block w-2 h-2 rounded-full flex-shrink-0 ${colors[status] || colors.idle}`} />;
}

/* ── QualityWarnings ─────────────────────────────────────────── */
function QualityWarnings({ warnings, onDismiss }) {
  if (!warnings || warnings.length === 0) return null;
  return (
    <div className="flex-shrink-0 fade-in bg-amber-950/40 border border-amber-700/40 rounded-lg p-3 space-y-2">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span className="text-xs font-semibold tracking-wider uppercase text-amber-400">Photo Quality Issues</span>
        </div>
        <button onClick={onDismiss} className="text-text-muted hover:text-text-second text-sm leading-none">✕</button>
      </div>
      {warnings.map((w, i) => (
        <div key={i} className="pl-1 border-l-2 border-amber-700/50 space-y-0.5">
          <p className="text-xs text-text-second leading-relaxed">{w.message}</p>
          <p className="text-xs text-text-muted leading-relaxed italic">→ {w.suggestion}</p>
        </div>
      ))}
    </div>
  );
}

/* ── ErrorBanner ─────────────────────────────────────────────── */
function ErrorBanner({ message, onDismiss }) {
  if (!message) return null;
  return (
    <div className="flex-shrink-0 fade-in flex items-start gap-2 bg-red-950/40 border border-red-800/40 rounded-lg px-3 py-2">
      <svg className="flex-shrink-0 mt-0.5" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F87171" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p className="text-xs text-red-300 leading-relaxed flex-1">{message}</p>
      <button onClick={onDismiss} className="flex-shrink-0 text-text-muted hover:text-text-second text-sm leading-none">✕</button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR — fixed width, full height, only history scrolls
═══════════════════════════════════════════════════════════════ */
function Sidebar({ selectedCategory, onSelectCategory, history }) {
  return (
    <aside className="w-48 flex-shrink-0 flex flex-col h-full overflow-hidden bg-sidebar-bg border-r border-border-def">

      {/* Brand */}
      <div className="flex-shrink-0 px-3 py-3 border-b border-border-def flex items-center gap-2">
        <img src={LOGO_SRC} alt="ORION logo" className="w-8 h-8 object-contain flex-shrink-0" />
        <div className="min-w-0">
          <p className="text-sm font-semibold text-text-primary tracking-widest">ORION</p>
          <p className="text-xs text-text-muted truncate">Clinical Visualizer</p>
        </div>
      </div>

      {/* Categories */}
      <div className="flex-shrink-0 p-2 border-b border-border-def">
        <p className="text-xs font-semibold tracking-widest uppercase text-text-muted px-1 mb-1">Categories</p>
        <div className="space-y-0.5">
          {Object.keys(TREATMENTS).map(cat => {
            const isActive = cat === selectedCategory;
            return (
              <button key={cat} onClick={() => onSelectCategory(cat)}
                className={`w-full flex items-center gap-2 px-2 py-2 rounded-md text-xs font-medium transition-all duration-150 text-left
                  ${isActive ? 'text-white' : 'text-text-muted hover:text-blue-100 hover:bg-royal-blue/15'}`}
                style={isActive ? { background: 'linear-gradient(135deg,#2563EB,#22D3EE)' } : {}}>
                <span className={isActive ? 'text-white' : 'text-text-muted'}>{CATEGORY_ICONS[cat]}</span>
                {cat}
              </button>
            );
          })}
        </div>
      </div>

      {/* History — this section scrolls independently */}
      <div className="flex-1 flex flex-col overflow-hidden p-2">
        <p className="flex-shrink-0 text-xs font-semibold tracking-widest uppercase text-text-muted px-1 mb-1">Session History</p>
        <div className="flex-1 overflow-y-auto space-y-1.5 min-h-0">
          {history.length === 0 ? (
            <p className="text-xs text-text-muted text-center py-3">No transformations yet</p>
          ) : (
            history.map((item, i) => (
              <div key={i} className="flex items-start gap-1.5 p-1.5 rounded bg-app-bg border border-border-def fade-in">
                <div className="w-7 h-7 rounded bg-border-def flex-shrink-0 overflow-hidden">
                  {item.thumb && <img src={item.thumb} className="w-full h-full object-cover" alt="" />}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-xs text-text-second font-medium truncate">{formatTreatment(item.treatment)}</p>
                  <p className="text-xs text-text-muted">{item.category} · {item.intensity}%</p>
                </div>
              </div>
            ))
          )}
        </div>
      </div>

      {/* Disclaimer */}
      <div className="flex-shrink-0 px-3 py-2 border-t border-border-def">
        <p className="text-xs text-text-muted opacity-50 leading-relaxed">Demo UI · Not a medical device</p>
      </div>
    </aside>
  );
}

/* ═══════════════════════════════════════════════════════════════
   CANVAS PREVIEW — flex-1, no fixed heights, image fits container
═══════════════════════════════════════════════════════════════ */
function CanvasPreview({ uploadedImage, previewUrl, isLoading, loadingStage, onUpload, intensity, selectedTreatment }) {
  const fileRef = useRef();
  const displayUrl = previewUrl || uploadedImage;
  const isResult = !!previewUrl;

  const handleDrop = useCallback(e => {
    e.preventDefault();
    const f = e.dataTransfer.files?.[0];
    if (f && (f.type === 'image/jpeg' || f.type === 'image/png')) onUpload(f);
  }, [onUpload]);

  return (
    <div className="flex-1 flex flex-col min-w-0 min-h-0 overflow-hidden p-3 gap-2">

      {/* Top bar */}
      <div className="flex-shrink-0 flex items-center justify-between">
        <div className="min-w-0">
          <h2 className="text-sm font-semibold text-text-primary tracking-tight">Patient Preview</h2>
          <p className="text-xs text-text-muted mt-0.5 truncate">
            {displayUrl ? (isResult ? `Showing: ${formatTreatment(selectedTreatment)}` : 'Original photo') : 'Upload a patient photo to begin'}
          </p>
        </div>
        <label>
          <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png"
            onChange={e => { const f = e.target.files?.[0]; if (f) onUpload(f); e.target.value=''; }} />
          <Button variant="ghost" className="cursor-pointer" onClick={() => fileRef.current?.click()}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            Upload
          </Button>
        </label>
      </div>

      {/* Canvas — flex-1 so it fills remaining height */}
      <div className="flex-1 relative rounded-xl overflow-hidden border border-border-def min-h-0"
        style={{ background: '#020617' }}
        onDragOver={e => e.preventDefault()} onDrop={handleDrop}>

        {/* Subtle radial gradient */}
        <div className="absolute inset-0 pointer-events-none"
          style={{ background: 'radial-gradient(circle at center, rgba(34,211,238,0.05), transparent 70%)' }} />

        {/* Canvas header */}
        <div className="absolute top-0 left-0 right-0 z-10 flex items-center justify-between px-3 py-2
          bg-canvas-bg/80 backdrop-blur-sm border-b border-border-def">
          <div className="flex items-center gap-2">
            <StatusDot status={isLoading ? 'loading' : displayUrl ? 'ready' : 'idle'} />
            <span className="text-xs text-text-muted font-mono">
              {isLoading ? loadingStage : displayUrl ? (isResult ? 'TRANSFORMED' : 'ORIGINAL') : 'AWAITING INPUT'}
            </span>
          </div>
          <div className="flex items-center gap-2">
            {isResult && <span className="text-xs font-mono text-soft-blue truncate max-w-32">{formatTreatment(selectedTreatment)}</span>}
            <span className="text-xs font-mono text-text-muted">INT <span className="text-soft-blue">{intensity}%</span></span>
          </div>
        </div>

        {/* Image fills container, object-contain preserves ratio */}
        {displayUrl ? (
          <img key={displayUrl} src={displayUrl} alt="Preview"
            className="absolute inset-0 w-full h-full object-contain fade-in"
            style={{ paddingTop: '40px', paddingBottom: '36px' }} />
        ) : (
          <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 fade-in"
            style={{ paddingTop: '40px', paddingBottom: '36px' }}>
            <div className="w-16 h-16 rounded-full border border-border-def flex items-center justify-center">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F2937" strokeWidth="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div className="text-center space-y-1">
              <p className="text-sm font-medium text-text-muted">No image loaded</p>
              <p className="text-xs text-text-muted opacity-60 max-w-xs leading-relaxed">
                Upload a clear front-facing patient photo · JPG or PNG · Max 10 MB
              </p>
            </div>
            <label>
              <input type="file" accept=".jpg,.jpeg,.png"
                onChange={e => { const f = e.target.files?.[0]; if (f) onUpload(f); e.target.value=''; }} />
              <Button variant="primary" className="cursor-pointer" onClick={() => {}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                Choose Patient Photo
              </Button>
            </label>
            <p className="text-xs text-text-muted opacity-40">or drag and drop here</p>
          </div>
        )}

        {/* Loading overlay */}
        {isLoading && (
          <div className="absolute inset-0 z-20 flex flex-col items-center justify-center gap-3
            bg-canvas-bg/80 backdrop-blur-sm fade-in">
            <div className="w-9 h-9 rounded-full border-2 border-border-def border-t-royal-blue spin" />
            <div className="text-center space-y-0.5">
              <p className="text-sm font-medium text-text-second">{loadingStage}</p>
              <p className="text-xs text-text-muted">Please wait</p>
            </div>
          </div>
        )}

        {/* Canvas footer */}
        <div className="absolute bottom-0 left-0 right-0 z-10 flex items-center justify-between px-3 py-2
          bg-canvas-bg/80 backdrop-blur-sm border-t border-border-def">
          <p className="text-xs text-text-muted truncate">
            {displayUrl ? 'Click "Preview" to apply treatment' : 'Drag & drop supported'}
          </p>
          <p className="text-xs text-text-muted opacity-40 font-mono flex-shrink-0 ml-2">ORION · DEMO</p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   CONTROL PANEL — fixed width, full height, scrolls if needed
═══════════════════════════════════════════════════════════════ */
function ControlPanel({
  selectedCategory, selectedTreatment, onTreatmentChange,
  intensity, onIntensityChange,
  xPosition, onXPositionChange,
  yPosition, onYPositionChange,
  onPreview, onApplyFinal,
  hasImage, hasResult, onDownload, isLoading,
}) {
  const treatments = TREATMENTS[selectedCategory] || [];
  return (
    <aside className="w-64 flex-shrink-0 h-full overflow-y-auto bg-sidebar-bg border-l border-border-def">
      <div className="p-3 space-y-2.5">

        {/* Category display */}
        <SectionCard title="Category">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded bg-deep-blue/40 border border-deep-blue/60 flex items-center justify-center text-soft-blue flex-shrink-0">
              {CATEGORY_ICONS[selectedCategory]}
            </div>
            <div>
              <p className="text-sm font-semibold text-text-primary">{selectedCategory}</p>
              <p className="text-xs text-text-muted">{treatments.length} treatments</p>
            </div>
          </div>
        </SectionCard>

        {/* Treatment */}
        <SectionCard title="Treatment">
          <select value={selectedTreatment} onChange={e => onTreatmentChange(e.target.value)}
            className="w-full bg-app-bg border border-border-def rounded-md px-2 py-2
              text-xs text-text-primary focus:outline-none focus:border-royal-blue transition-colors cursor-pointer">
            {treatments.map(t => <option key={t} value={t}>{formatTreatment(t)}</option>)}
          </select>
        </SectionCard>

        {/* Intensity */}
        <SectionCard title="Intensity">
          <Slider label="Strength" value={intensity} min={0} max={100} onChange={onIntensityChange} unit="%" />
          <div className="flex justify-between mt-1.5">
            <span className="text-xs text-text-muted">Subtle</span>
            <span className="text-xs text-text-muted">Strong</span>
          </div>
        </SectionCard>

        {/* Position */}
        <SectionCard title="Position Adjust">
          <div className="space-y-3">
            <Slider label="X — Left / Right" value={xPosition} min={-50} max={50} onChange={onXPositionChange} unit="" bilateral />
            <Slider label="Y — Up / Down"    value={yPosition} min={-50} max={50} onChange={onYPositionChange} unit="" bilateral />
          </div>
        </SectionCard>

        {/* Actions */}
        <SectionCard title="Actions">
          <div className="space-y-2">
            <div className="grid grid-cols-2 gap-2">
              <Button variant="primary" onClick={onPreview} disabled={!hasImage || isLoading} fullWidth>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Preview
              </Button>
              <Button variant="final" onClick={onApplyFinal} disabled={!hasImage || isLoading} fullWidth>
                Apply Final
              </Button>
            </div>
            {hasResult && (
              <Button variant="ghost" onClick={onDownload} fullWidth className="fade-in">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download Result
              </Button>
            )}
          </div>
        </SectionCard>

        {/* Notes */}
        <div className="bg-deep-blue/10 border border-deep-blue/30 rounded-lg p-2.5 space-y-1">
          <p className="text-xs font-semibold text-soft-blue tracking-wide">Clinical Notes</p>
          <p className="text-xs text-text-muted leading-relaxed">
            <span className="text-text-second font-medium">Preview</span> uses a downscaled image for speed.
          </p>
          <p className="text-xs text-text-muted leading-relaxed">
            <span className="text-text-second font-medium">Apply Final</span> generates full-resolution output.
          </p>
        </div>

        {/* Reset position */}
        {(xPosition !== 0 || yPosition !== 0) && (
          <button onClick={() => { onXPositionChange(0); onYPositionChange(0); }}
            className="text-xs text-text-muted hover:text-text-second transition-colors text-center w-full fade-in">
            Reset position to centre
          </button>
        )}

      </div>
    </aside>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT — h-screen, overflow-hidden, no global scroll
═══════════════════════════════════════════════════════════════ */
function App() {
  const [selectedCategory, setSelectedCategory] = useState('Face');
  const [selectedTreatment, setSelectedTreatment] = useState('temples_fillers');
  const [intensity, setIntensity] = useState(60);
  const [xPosition, setXPosition] = useState(0);
  const [yPosition, setYPosition] = useState(0);
  const [imageId, setImageId] = useState(null);
  const [uploadedImageUrl, setUploadedImageUrl] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);
  const [isLoading, setIsLoading] = useState(false);
  const [loadingStage, setLoadingStage] = useState('');
  const [error, setError] = useState(null);
  const [qualityWarnings, setQualityWarnings] = useState([]);
  const [history, setHistory] = useState([]);

  const handleSelectCategory = cat => {
    setSelectedCategory(cat);
    setSelectedTreatment(TREATMENTS[cat][0]);
    setPreviewUrl(null);
  };

  const handleUpload = async file => {
    if (!file) return;
    setError(null); setQualityWarnings([]); setPreviewUrl(null);
    setIsLoading(true); setLoadingStage('Uploading & analysing…');
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch(`${API_BASE}/api/upload/image`, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.face_quality_passed === false) { setQualityWarnings(data.face_quality_warnings || []); return; }
      if (data.success && data.image_id) {
        setImageId(data.image_id);
        setUploadedImageUrl(`${API_BASE}${data.image_url}`);
        setPreviewUrl(null);
      } else { setError('Upload failed: ' + (data.message || 'Unknown error')); }
    } catch { setError('Could not connect to backend. Make sure it is running on port 8000.'); }
    finally { setIsLoading(false); setLoadingStage(''); }
  };

  const handleTransform = async (preview) => {
    if (!imageId) { setError('Please upload an image first.'); return; }
    setError(null); setIsLoading(true);
    setLoadingStage(preview ? 'Generating preview…' : 'Applying full resolution…');
    try {
      const res = await fetch(`${API_BASE}/api/transform/apply`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image_id: imageId, category: selectedCategory.toLowerCase(),
          treatment: selectedTreatment, intensity: intensity / 100,
          position_x: xPosition / 50, position_y: yPosition / 50, preview,
        }),
      });
      const data = await res.json();
      if (data.success && data.preview_url) {
        const url = data.preview_url.startsWith('http')
          ? `${data.preview_url}?t=${Date.now()}`
          : `${API_BASE}${data.preview_url}?t=${Date.now()}`;
        setPreviewUrl(url);
        setHistory(prev => [{ treatment: selectedTreatment, category: selectedCategory, intensity, thumb: url, preview }, ...prev.slice(0, 9)]);
      } else { setError('Transform failed: ' + (data.message || 'Unknown error')); }
    } catch { setError('Could not connect to backend. Make sure it is running on port 8000.'); }
    finally { setIsLoading(false); setLoadingStage(''); }
  };

  const handleDownload = () => {
    if (!previewUrl) return;
    const a = document.createElement('a');
    a.href = previewUrl;
    a.download = `treatment-${selectedTreatment}-${Date.now()}.jpg`;
    a.click();
  };

  return (
    /* Root: full viewport, no overflow, flex column */
    <div className="h-screen w-screen overflow-hidden flex flex-col bg-app-bg">

      {/* ── HEADER: flex-shrink-0, never grows ─────────────────── */}
      <header className="flex-shrink-0 border-b border-border-def bg-sidebar-bg">
        
      </header>

      {/* ── BODY: flex-1, no overflow on outer wrapper ──────────── */}
      <div className="flex-1 flex min-h-0 overflow-hidden">

        {/* Sidebar */}
        <Sidebar
          selectedCategory={selectedCategory}
          onSelectCategory={handleSelectCategory}
          history={history}
        />

        {/* Centre column: canvas + notifications */}
        <div className="flex-1 flex flex-col min-w-0 min-h-0 overflow-hidden">
          {/* Notifications (only shown when present, flex-shrink-0) */}
          {(error || qualityWarnings.length > 0) && (
            <div className="flex-shrink-0 px-3 pt-3 space-y-2">
              <ErrorBanner message={error} onDismiss={() => setError(null)} />
              <QualityWarnings warnings={qualityWarnings} onDismiss={() => setQualityWarnings([])} />
            </div>
          )}
          {/* Canvas fills remaining space */}
          <CanvasPreview
            uploadedImage={uploadedImageUrl}
            previewUrl={previewUrl}
            isLoading={isLoading}
            loadingStage={loadingStage}
            onUpload={handleUpload}
            intensity={intensity}
            selectedTreatment={selectedTreatment}
          />
        </div>

        {/* Control panel */}
        <ControlPanel
          selectedCategory={selectedCategory}
          selectedTreatment={selectedTreatment}
          onTreatmentChange={setSelectedTreatment}
          intensity={intensity}
          onIntensityChange={setIntensity}
          xPosition={xPosition}
          onXPositionChange={setXPosition}
          yPosition={yPosition}
          onYPositionChange={setYPosition}
          onPreview={() => handleTransform(true)}
          onApplyFinal={() => handleTransform(false)}
          hasImage={!!imageId}
          hasResult={!!previewUrl}
          onDownload={handleDownload}
          isLoading={isLoading}
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
